    <h1>LlamaJoinCaravanEvent</h1>
    <p>Called when a Llama tries to join a caravan. <p> Cancelling the event will not let the Llama join. To prevent future attempts at joining a caravan use {@link Llama#setShouldJoinCaravan(boolean)}.</p>
